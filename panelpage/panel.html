
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supreme Admin Panel</title>
  <link rel="stylesheet" href="panelstyle.css" />
</head>
<body>

<div class="container">
<div class="token-panel">

<h3>Progress Token</h3>

<div class="token-box">

<input id="tokenInput" placeholder="Enter progress token">

<button id="applyTokenBtn">Apply</button>

</div>

<div class="token-display">
Current Token: <span id="currentToken">None</span>
</div>

</div>
  <!-- TOP SEARCH -->
  <div class="top-panel">
    <h2>𝐒𝐞𝐚𝐫𝐜𝐡 𝑨𝐧𝐢𝐦𝐞 𝙸𝙳</h2>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search ID..." />
    <button id="searchBtn">Search</button>
  </div>
  <select id="animeSelect" size="8"></select>
</div>

  <!-- IMAGE -->
  <div class="image-section">
    <img id="bannerImage" />
    <input type="text" id="image_url" placeholder="Image URL" />
  </div>

  <!-- ANIME INFO FIELDS -->
<div class="form-section" id="animeInfoSection">
  <h3>𝑨𝒏𝒊𝒎𝒆 𝐈𝐧𝐟𝐨𝐬.</h3>
  <div id="animeInfoFields" class="anime-fields-grid"></div>
</div>
<!-- STREAMLINKS HEADING -->
<div class="form-section">
  <div class="neon-strip"> 𝑨𝐧𝐢𝐦𝐞 𝐒𝐭𝐫𝐞𝐚𝐦𝐥𝐢𝐧𝐤𝐬</div>
</div>

<!-- EPISODES -->
<div class="form-section">
  <h3>𝗘𝗽𝗶𝘀𝗼𝗱𝗲𝘀</h3>

  <div class="episode-top-actions">
  <button type="button" id="addEpisodeBtn">➕𝙀𝙥𝙞𝙨𝙤𝙙𝙚</button>
  <button type="button" id="removeEpisodeBtn" class="danger-btn">➖𝙀𝙥𝙞𝙨𝙤𝙙𝙚</button>
</div>

<div id="removeConfirmBox" class="confirm-box" style="display:none;"></div>

  <div id="episodesContainer"></div>
</div>
<div id="episodeEditor" class="episode-editor">

  <div class="editor-panel">

    <div class="editor-header">
      <span id="editorTitle">Edit Episode</span>
      <button id="closeEditorBtn">✕</button>
    </div>

    <div class="editor-body" id="editorBody"></div>

    <div class="editor-actions">
      <button id="saveEpisodeBtn">Save</button>
      <button id="cancelEpisodeBtn">Cancel</button>
    </div>

  </div>

</div>
  <button id="updateBtn">𝑼𝒑𝒅𝒂𝒕𝒆 𝐒𝐐𝐋</button>
  <button id="clearCacheBtn">Clear Draft Cache</button>
<div id="draftStatus" style="
  font-size:12px;
  color:#00c853;
  margin-top:5px;
  display:none;
  padding:3px;
">
● Draft Saved
</div>
</div>

<script src="panelscript.js"></script>
  <button id="saveProgressBtn" class="floating-save">
𝗙𝗹𝗮𝘀𝗵 𝗦𝗮𝘃𝗲
</button>
</body>
</html>
