<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Anime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lock-container">
    
    <div class="lock-card">

      <h1 class="main-heading">
        𝐍𝒆𝒐𝒏 𝑨𝐧𝐢𝐦𝐞<br>
        𝗔𝘀𝗶𝗮𝗻 𝗔𝗯𝘀𝗼𝗹𝘂𝘁𝗲 𝗔𝗱𝗺𝗶𝗻
      </h1>

      <p class="dev-message">
        This is the official ADMIN PANEL of site Neonanineasia. Its designed by 'L.Arashi' so strictly don,t share the link of this panel to anyone.
      </p>

      <form id="adminForm" autocomplete="off">

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="input-group">
          <label>Real Name</label>
          <input type="text" id="realName" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" required />
        </div>
        
        <button type="submit" class="verify-btn">
          Verify
        </button>

      </form>

      <p id="errorMsg" class="error-msg"></p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
