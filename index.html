<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Anime Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lock-container">
    
    <div class="lock-card">
<h1 class="main-heading">
  <span class="title">𝐍𝐞𝐨𝐧'𝐬 𝐑𝐚𝐤𝐮𝐭𝐞𝐧 𝐂𝐫𝐞𝐝𝐢𝐭</span>
  <span class="headline-sub">𝐵𝑦 𝑈𝑟𝑎𝐶𝑒𝑙𝑙 𝐶𝑜𝑟𝑝𝑜𝑟𝑎𝑡𝑖𝑜𝑛™</span>
</h1>
      <p class="dev-message">
        The official employ financial software for workers in Uracell. Its strictly recommended to not share the link of this page to anyone.
      </p>

      <form id="adminForm" autocomplete="off">

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="input-group">
          <label>Real Name</label>
          <input type="text" id="realName" required />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" required />
        </div>
<button id="verifyBtn" type="submit">Verify</button>
      </form>
      <p id="errorMsg" class="error-msg"></p>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
